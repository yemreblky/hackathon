<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Sicht - Endüstriyel Haber Radarı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sol Panel: Akıllı Haber & RSS Ekleme -->
        <aside class="sidebar">
            <h2>Haber Radarı</h2>
            <div class="rss-input-group">
                <input type="text" id="rssUrlInput" placeholder="RSS veya Haber Linki...">
                <button id="addRssBtn" title="Otomatik algılar ve ekler">Ekle</button>
            </div>
            <ul id="rssList" class="rss-list">
                <!-- JS tarafından dinamik doldurulur -->
            </ul>
        </aside>

        <!-- Ana İçerik Alanı -->
        <main class="main-content">
            <header class="top-bar">
                <!-- Arama Kutusu -->
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Haberlerde veya şirketlerde ara...">
                </div>
                
                <div class="filters">
                    <!-- Sıralama Seçenekleri -->
                    <select id="sortFilter">
                        <option value="default">Sırala: Varsayılan</option>
                        <option value="scoreDesc">Skor (Yüksekten Düşüğe)</option>
                        <option value="scoreAsc">Skor (Düşükten Yükseğe)</option>
                        <option value="dateDesc">Tarih (En Yeni)</option>
                        <option value="dateAsc">Tarih (En Eski)</option>
                        <option value="source">Kaynak (A-Z)</option>
                    </select>

                    <!-- Tarih Filtresi -->
                    <input type="date" id="dateFilter">
    
                    <!-- Minimum Skor Filtresi -->
                    <select id="scoreFilter">
                        <option value="0">Min. Skor: Tümü</option>
                        <option value="50">Skor: 50+</option>
                        <option value="80">Skor: 80+</option>
                    </select>

                    <!-- Slayt 7.3'e Birebir Uyumlu Olay Tipi Filtresi -->
                    <select id="typeFilter" style="max-width: 300px;">
                        <option value="all">Tüm Olaylar</option>
                        <option value="relocation">Bir fabrikanın / üretim hattının başka bir lokasyona taşınması</option>
                        <option value="closure">Tesis kapanışı, küçülme, üretimi durdurma</option>
                        <option value="expansion">Mevcut tesisin büyütülmesi, kapasite artışı</option>
                        <option value="new_plant">Yeni fabrika / greenfield yatırım duyurusu</option>
                        <option value="tender">İhale, tedarik veya satın alma duyurusu</option>
                        <option value="other">Yukarıdakilerin hiçbiri / belirsiz</option>
                    </select>

                    <!-- Son Güncelleme Zamanı -->
                    <span id="lastUpdate" style="font-size: 0.8rem; color: #64748b; align-self: center; margin-right: 5px; font-weight: 500;"></span>
                    
                    <!-- Manuel Yenileme Butonu -->
                    <button id="refreshBtn" class="refresh-btn">Yenile</button>
                </div>
            </header>

            <!-- Haber Kartları Izgarası -->
            <section id="newsContainer" class="news-grid">
                <!-- Boş Durum (Empty State) -->
                <div id="emptyState" class="empty-state" style="display: none;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#bdc3c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8l-4 4v14a2 2 0 0 0 2 2z"></path>
                        <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
                        <path d="M10 13h4"></path>
                        <path d="M10 17h4"></path>
                        <path d="M14 9h-4"></path>
                    </svg>
                    <p>Henüz haber yok. Sol taraftan bir link ekleyin ve Yenile'ye basın.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL: Haber Detay Penceresi -->
    <div id="newsModal" class="modal-overlay">
        <div class="modal-content">
            <button id="closeModalBtn" class="close-btn">&times;</button>
            <div id="modalBody">
                <!-- JS tarafından dinamik doldurulur -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
