<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOS Pro Sicht - Endüstriyel Radar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <!-- SOL PANEL -->
        <aside class="sidebar">
            <div class="brand-header">
                <h2>BIOS Radar</h2>
                <span class="brand-subtitle">Industrıal Engıneerıng</span>
            </div>
            
            <div class="rss-input-group">
                <input type="text" id="rssUrlInput" placeholder="RSS veya Haber Linki...">
                <button id="addRssBtn" title="Otomatik algılar ve ekler">Ekle</button>
            </div>
            <ul id="rssList" class="rss-list">
                <!-- JS tarafından doldurulur -->
            </ul>

            <div class="sidebar-footer">
                <a href="#" id="exportCsvBtnSidebar" class="sidebar-link" title="Haberleri CSV formatında indir">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    CSV İndir
                </a>
                
                <a href="#" id="exportExcelBtnSidebar" class="sidebar-link" title="Haberleri Excel formatında indir">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="9" y1="21" x2="9" y2="9"></line>
                    </svg>
                    Excel İndir
                </a>
                
                <a href="#" class="sidebar-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    Contact Us
                </a>
            </div>
        </aside>

        <!-- ANA İÇERİK -->
        <main class="main-content">
            
            <!-- İKİ SATIRLI (TWO-TIER) ÜST BAR -->
            <header class="top-bar">
                <!-- ÜST SATIR: Arama ve Hızlı İşlemler -->
                <div class="top-bar-main">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Haberlerde veya şirketlerde ara...">
                    </div>

                    <div class="top-bar-right">
                        <span id="lastUpdate" class="last-update"></span>
                        
                        <button id="showFavoritesBtn" class="theme-btn" title="Favorileri Göster" style="border-radius: 20px; width: auto; padding: 0 15px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 5px;">
                            ⭐ Favoriler
                        </button>

                        <select id="autoRefreshFilter" style="padding: 10px 18px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-surface); color: var(--text-primary); font-size: 0.85rem; font-weight: 500; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.02);">
                            <option value="0">Oto Yenileme: Kapalı</option>
                            <option value="5">5 Dakikada Bir</option>
                            <option value="15">15 Dakikada Bir</option>
                            <option value="30">30 Dakikada Bir</option>
                        </select>

                        <button id="themeToggleBtn" class="theme-btn" title="Temayı Değiştir">🌙</button>
                        <button id="refreshBtn" class="refresh-btn">Yenile</button>
                    </div>
                </div>

                <!-- ALT SATIR: Filtreler -->
                <div class="filters">
                    <select id="sortFilter">
                        <option value="default">Sırala: Varsayılan</option>
                        <option value="scoreDesc">Skor (Yüksekten Düşüğe)</option>
                        <option value="scoreAsc">Skor (Düşükten Yükseğe)</option>
                        <option value="dateDesc">Tarih (En Yeni)</option>
                        <option value="dateAsc">Tarih (En Eski)</option>
                    </select>

                    <div class="date-picker-container" title="Tarihe Göre Filtrele">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        <input type="text" id="dateFilter" placeholder="Tarih Seç" onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'">
                    </div>
    
                    <select id="scoreFilter">
                        <option value="0">Min. Skor: Tümü</option>
                        <option value="50">Skor: 50+</option>
                        <option value="80">Skor: 80+</option>
                    </select>

                    <select id="typeFilter">
                        <option value="all">Olay Tipi: Tüm Olaylar</option>
                        <option value="relocation">Taşıma (Relocation)</option>
                        <option value="closure">Kapanış (Closure)</option>
                        <option value="expansion">Genişleme (Expansion)</option>
                        <option value="new_plant">Yeni Yatırım (New Plant)</option>
                        <option value="tender">İhale (Tender)</option>
                        <option value="other">Diğer(Other)</option>
                    </select>
                </div>
            </header>

            <section id="newsContainer" class="news-grid">
                <div id="emptyState" class="empty-state" style="display: none;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--border-color)" stroke-width="2">
                        <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8l-4 4v14a2 2 0 0 0 2 2z"></path>
                        <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
                    </svg>
                    <p>Henüz haber yok. Lütfen sol taraftan bir kaynak ekleyin veya filtreleri temizleyin.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- HABER DETAY MODALI -->
    <div id="newsModal" class="modal-overlay">
        <div class="modal-content">
            <button id="closeModalBtn" class="close-btn">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ÖZEL ONAY (CONFIRM) POP-UP'I -->
    <div id="customConfirmOverlay" class="modal-overlay" style="display: none; z-index: 2000;">
        <div class="modal-content" style="max-width: 450px; text-align: center; padding: 35px 25px;">
            <h3 id="confirmTitle" style="margin-bottom: 15px; font-size: 1.3rem; color: var(--bios-red);"></h3>
            <p id="confirmMessage" style="color: var(--text-primary); margin-bottom: 25px; line-height: 1.6; font-size: 0.95rem;"></p>
            <div id="confirmButtons" style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                <!-- Butonlar JS ile buraya eklenecek -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
