<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOS Pro Sicht - Endüstriyel Radar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <!-- Sol Panel: GİZLENEN VE ÜSTÜNE GELİNCE KAYARAK AÇILAN MENÜ -->
        <aside class="sidebar">
            <div class="brand-header">
                <h2>BIOS Radar</h2>
                <span class="brand-subtitle">Industrial Engineering</span>
            </div>
            
            <div class="rss-input-group">
                <input type="text" id="rssUrlInput" placeholder="RSS veya Haber Linki...">
                <button id="addRssBtn" title="Otomatik algılar ve ekler">Ekle</button>
            </div>
            <ul id="rssList" class="rss-list">
                <!-- JS tarafından doldurulur -->
            </ul>

            <div class="sidebar-footer">
                <a href="#" class="sidebar-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    Help & Documentation
                </a>
                <a href="#" class="sidebar-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    Contact Us
                </a>
            </div>
        </aside>

        <!-- Ana İçerik Alanı -->
        <main class="main-content">
            <header class="top-bar">
                
                <!-- SOL: Arama Kutusu -->
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Haberlerde veya şirketlerde ara...">
                </div>
                
                <!-- ORTA: Modernize Edilmiş Hap (Pill) Filtreler -->
                <div class="filters">
                    <select id="sortFilter">
                        <option value="default">Sırala: Varsayılan</option>
                        <option value="scoreDesc">Skor (Yüksekten Düşüğe)</option>
                        <option value="scoreAsc">Skor (Düşükten Yükseğe)</option>
                        <option value="dateDesc">Tarih (En Yeni)</option>
                        <option value="dateAsc">Tarih (En Eski)</option>
                    </select>

                    <!-- YENİ: İkonlu Özel Tarih Seçici -->
                <!-- YENİ: Akıllı Tarih Seçici ("gg.aa.yyyy" gizlenmiş hali) -->
                <div class="date-picker-container" title="Tarihe Göre Filtrele">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <input type="text" id="dateFilter" placeholder="Tarih Seç" onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'">
                </div>
    
                    <select id="scoreFilter">
                        <option value="0">Min. Skor: Tümü</option>
                        <option value="50">Skor: 50+</option>
                        <option value="80">Skor: 80+</option>
                    </select>

                    <select id="typeFilter">
                        <option value="all">Olay Tipi: Tüm Olaylar</option>
                        <option value="relocation">Taşıma (Relocation)</option>
                        <option value="closure">Kapanış (Closure)</option>
                        <option value="expansion">Genişleme (Expansion)</option>
                        <option value="new_plant">Yeni Yatırım (Greenfield)</option>
                        <option value="tender">İhale (Tender)</option>
                        <option value="other">Diğer</option>
                    </select>
                </div>

                <!-- SAĞ: Tema Butonu, Güncelleme Saati ve Yenile Butonu -->
                <div class="top-bar-right">
                    <span id="lastUpdate" class="last-update"></span>
                    <button id="themeToggleBtn" class="theme-btn" title="Temayı Değiştir">🌙</button>
                    <button id="refreshBtn" class="refresh-btn">Yenile</button>
                </div>

            </header>

            <section id="newsContainer" class="news-grid">
                <div id="emptyState" class="empty-state" style="display: none;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--border-color)" stroke-width="2">
                        <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8l-4 4v14a2 2 0 0 0 2 2z"></path>
                        <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
                    </svg>
                    <p>Henüz haber yok. Lütfen sol taraftan bir kaynak ekleyin.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL -->
    <div id="newsModal" class="modal-overlay">
        <div class="modal-content">
            <button id="closeModalBtn" class="close-btn">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
